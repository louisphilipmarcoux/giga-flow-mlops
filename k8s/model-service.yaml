apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-service
  labels:
    app: gigaflow
    component: model-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gigaflow
      component: model-service
  template:
    metadata:
      labels:
        app: gigaflow
        component: model-service
    spec:
      containers:
        - name: model-service
          image: louisphilip/gigaflow-base:inference
          command: ["uvicorn", "src.model_service.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          env:
            - name: KAFKA_SERVER
              value: "kafka:29092"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow-server:5000"
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio:9000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gigaflow-secrets
                  key: database-url
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: gigaflow-secrets
                  key: minio-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: gigaflow-secrets
                  key: minio-secret-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: model-service
spec:
  selector:
    app: gigaflow
    component: model-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: model-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: model-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
