name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check src/ scripts/ tests/"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check src/ scripts/ tests/"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
